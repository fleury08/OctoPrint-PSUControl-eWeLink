name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get version from setup.py
        id: get_version
        run: |
          VERSION=$(python -c "import re; content=open('setup.py').read(); print(re.search(r'plugin_version\s*=\s*[\"\\']([^\"\\']+)[\"\\']', content).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify version matches
        run: |
          if [ "${{ steps.get_version.outputs.version }}" != "${{ inputs.version }}" ]; then
            echo "Error: Input version (${{ inputs.version }}) does not match setup.py version (${{ steps.get_version.outputs.version }})"
            echo "Please update setup.py before releasing."
            exit 1
          fi

      - name: Run tests
        run: |
          python -m unittest discover -s tests -v

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: v${{ inputs.version }}
          body: |
            ## OctoPrint-PSUControl-eWeLink v${{ inputs.version }}
            
            ### Installation
            
            Install via OctoPrint Plugin Manager or manually:
            ```
            https://github.com/${{ github.repository }}/archive/${{ inputs.version }}.zip
            ```
            
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/docs/CHANGELOG.md) for details.
          draft: false
          prerelease: false
          generate_release_notes: true
